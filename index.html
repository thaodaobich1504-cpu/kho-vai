<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POS Vải</title>

<style>
body{margin:0;font-family:-apple-system;background:#f2f4f8}

/* HEADER */
.header{
background:white;
padding:12px;
font-weight:bold;
}

/* PRODUCT GRID */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:10px;
margin-bottom:260px;
}

.product{
background:white;
border-radius:12px;
padding:12px;
text-align:center;
font-size:14px;
}

.product b{font-size:15px}

/* INPUT */
.qty{
width:100%;
padding:8px;
margin-top:6px;
border-radius:8px;
border:1px solid #ddd;
}

/* BUTTON */
.btn{
background:#2f80ed;
color:white;
padding:10px;
border-radius:8px;
margin-top:6px;
}

/* CART FIXED */
.cart{
position:fixed;
bottom:70px;
left:0;
right:0;
background:white;
border-top:1px solid #ddd;
padding:10px;
max-height:200px;
overflow:auto;
}

/* TOTAL */
.total{
font-size:16px;
font-weight:bold;
}

/* PAY */
.pay{
background:#27ae60;
color:white;
padding:14px;
text-align:center;
font-size:16px;
margin-top:8px;
border-radius:10px;
}

/* TAB */
.bottom{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-around;
background:white;
padding:10px 0;
border-top:1px solid #ddd;
}

.center{
width:60px;height:60px;
background:#2f80ed;
color:white;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
margin-top:-25px;
font-size:14px;
}

.hidden{display:none}
</style>
</head>

<body>

<div class="header">Bán hàng</div>

<!-- SELL SCREEN -->
<div id="sell">

<div class="grid" id="grid"></div>

<div class="cart">
<div id="cartList"></div>
<div class="total">Tổng: <span id="sum">0</span></div>
<div class="pay" onclick="pay()">Thanh toán</div>
</div>

</div>

<!-- TAB -->
<div class="bottom">
<div>Trang</div>
<div>Kho</div>
<div class="center">Bán</div>
<div>Báo cáo</div>
</div>

<script>
let skus=JSON.parse(localStorage.getItem("skus")||"[]");
let cart=[];

/* DEMO DATA (nếu chưa có) */
if(skus.length==0){
skus=[
{name:"Cotton",color:"Đỏ",price:50000,stock:100,id:1},
{name:"Lụa",color:"Xanh",price:70000,stock:50,id:2}
];
}

/* RENDER GRID */
function render(){
grid.innerHTML="";
skus.forEach(s=>{
grid.innerHTML+=`
<div class="product">
<b>${s.name}</b><br>
${s.color}<br>
${s.price}đ<br>
<input class="qty" id="q${s.id}" placeholder="m">
<div class="btn" onclick="add(${s.id})">Thêm</div>
</div>`;
});
renderCart();
}

/* ADD */
function add(id){
let q=parseFloat(document.getElementById("q"+id).value);
if(!q) return;

let s=skus.find(x=>x.id==id);

cart.push({
id:s.id,
name:s.name+"-"+s.color,
qty:q,
total:q*s.price
});

renderCart();
}

/* CART */
function renderCart(){
let html="",t=0;

cart.forEach((c,i)=>{
t+=c.total;
html+=`
<div style="display:flex;justify-content:space-between">
<div>${c.name} (${c.qty}m)</div>
<div>${c.total}</div>
</div>`;
});

cartList.innerHTML=html;
sum.innerText=t;
}

/* PAY */
function pay(){
alert("Thanh toán: "+sum.innerText);
cart=[];
renderCart();
}

render();
</script>

</body>
</html>
