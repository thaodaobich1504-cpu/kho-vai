<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kho Vải PRO</title>

<style>
body{margin:0;font-family:-apple-system;background:#f4f6f9}

/* UI */
.header{padding:15px;background:white;font-weight:bold}
.card{background:white;margin:10px;padding:15px;border-radius:12px}
input,select{width:100%;padding:10px;margin-top:6px;border-radius:8px;border:1px solid #ddd}
.btn{background:#2f80ed;color:white;padding:12px;border-radius:10px;text-align:center;margin-top:10px}
.row{display:flex;gap:5px}
.row input{flex:1}
.item{border-bottom:1px solid #eee;padding:8px 0}

.bottom{position:fixed;bottom:0;width:100%;display:flex;justify-content:space-around;background:white;padding:10px;border-top:1px solid #ddd}
.tab{font-size:12px}
.center{background:#2f80ed;color:white;border-radius:50%;width:60px;height:60px;display:flex;align-items:center;justify-content:center;margin-top:-30px}
.hidden{display:none}
</style>
</head>

<body>

<div class="header">Kho Vải PRO</div>

<!-- HOME -->
<div id="home">
<div class="card" id="dash"></div>
</div>

<!-- KHO -->
<div id="kho" class="hidden">
<div class="card">
<input id="fabric" placeholder="Tên vải">
<div id="rows"></div>
<div class="btn" onclick="addRow()">+ Dòng</div>
<div class="btn" onclick="saveImport()">Lưu</div>
</div>
<div class="card" id="stock"></div>
</div>

<!-- BÁN -->
<div id="sell" class="hidden">
<div class="card">
<select id="product"></select>
<input id="qty" type="number" step="0.01" placeholder="Số mét">
<div class="btn" onclick="addCart()">Thêm vào giỏ</div>
</div>

<div class="card" id="cart"></div>

<div class="card">
<select id="customer"></select>
<label><input type="checkbox" id="debt"> Ghi nợ</label>
<div class="btn" onclick="checkout()">Thanh toán</div>
</div>
</div>

<!-- KHÁCH -->
<div id="cus" class="hidden">
<div class="card">
<input id="cname" placeholder="Tên khách">
<div class="btn" onclick="addCus()">Thêm</div>
</div>
<div class="card" id="cusList"></div>
</div>

<!-- REPORT -->
<div id="report" class="hidden">
<div class="card" id="reportBox"></div>
</div>

<!-- TAB -->
<div class="bottom">
<div class="tab" onclick="show('home')">Trang chủ</div>
<div class="tab" onclick="show('kho')">Kho</div>
<div class="center" onclick="show('sell')">Bán</div>
<div class="tab" onclick="show('cus')">Khách</div>
<div class="tab" onclick="show('report')">Báo cáo</div>
</div>

<script>
let skus=JSON.parse(localStorage.getItem("skus")||"[]");
let bills=JSON.parse(localStorage.getItem("bills")||"[]");
let customers=JSON.parse(localStorage.getItem("customers")||"[]");
let cart=[];

function save(){
localStorage.setItem("skus",JSON.stringify(skus));
localStorage.setItem("bills",JSON.stringify(bills));
localStorage.setItem("customers",JSON.stringify(customers));
}
setInterval(save,2000);

function show(id){
["home","kho","sell","cus","report"].forEach(x=>{
document.getElementById(x).classList.add("hidden");
});
document.getElementById(id).classList.remove("hidden");
}

/* KHO */
function addRow(){
let d=document.createElement("div");
d.innerHTML=`
<input placeholder="Mã">
<input placeholder="Màu">
<input type="number" step="0.01" placeholder="Giá nhập">
<input type="number" step="0.01" placeholder="Giá bán">
<input type="number" step="0.01" placeholder="Số mét">`;
rows.appendChild(d);
}

function saveImport(){
let name=fabric.value;
rows.querySelectorAll("div").forEach(r=>{
let i=r.querySelectorAll("input");
let code=i[0].value;
let color=i[1].value;
let ip=+i[2].value||0;
let p=+i[3].value||0;
let q=+i[4].value||0;
if(!code) return;
let ex=skus.find(s=>s.code==code);
if(ex) ex.stock+=q;
else skus.push({name,code,color,importPrice:ip,price:p,stock:q});
});
rows.innerHTML=""; addRow(); save(); render();
}

/* CART */
function addCart(){
let s=skus[product.value];
let q=+qty.value;
if(!s||!q) return;

cart.push({
name:s.name+"-"+s.color,
price:s.price,
qty:q,
total:q*s.price
});

renderCart();
qty.value="";
}

function renderCart(){
cart.innerHTML="";
let html=""; let sum=0;

cart.forEach((c,i)=>{
sum+=c.total;
html+=`<div class="item">
${c.name} | ${c.qty}m | ${c.total}
<button onclick="remove(${i})">X</button>
</div>`;
});

html+=`<b>Tổng: ${sum}</b>`;
document.getElementById("cart").innerHTML=html;
}

function remove(i){
cart.splice(i,1);
renderCart();
}

/* CHECKOUT */
function checkout(){
if(cart.length==0) return;

let total=cart.reduce((a,b)=>a+b.total,0);

if(debt.checked){
customers[customer.value].debt+=total;
}

bills.push({time:new Date(),total});

cart=[];
renderCart();
save(); render();

window.print();
}

/* CUSTOMER */
function addCus(){
customers.push({name:cname.value,debt:0});
cname.value="";
save();render();
}

/* RENDER */
function render(){
stock.innerHTML="";
product.innerHTML="";
customer.innerHTML="";
cusList.innerHTML="";

let revenue=0;

skus.forEach((s,i)=>{
stock.innerHTML+=`<div class="item">${s.name}-${s.color} | ${s.stock}m</div>`;
product.innerHTML+=`<option value="${i}">${s.name}-${s.color}</option>`;
});

customers.forEach((c,i)=>{
customer.innerHTML+=`<option value="${i}">${c.name}</option>`;
cusList.innerHTML+=`<div class="item">${c.name} - Nợ:${c.debt}</div>`;
});

bills.forEach(b=>revenue+=b.total);

dash.innerHTML=`
Doanh thu: ${revenue}<br>
Số đơn: ${bills.length}
`;

reportBox.innerHTML=`
Doanh thu: ${revenue}<br>
Số đơn: ${bills.length}
`;
}

addRow();
render();
</script>

</body>
</html>
