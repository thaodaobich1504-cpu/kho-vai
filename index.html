<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>POS Kho Vải Pro</title>

<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;background:#f4f6f8;}
header{background:linear-gradient(135deg,#111,#333);color:#fff;padding:12px;text-align:center;}

.nav{display:flex;justify-content:space-around;background:#fff;padding:8px;font-size:12px;}
.nav div{background:#eee;padding:6px 10px;border-radius:20px;cursor:pointer;}

.container{padding:10px;}
.card{background:#fff;padding:10px;border-radius:10px;margin-bottom:10px;}

input{width:100%;padding:8px;margin:4px 0;border:1px solid #ddd;border-radius:8px;}
button{padding:8px;border:none;border-radius:8px;background:#111;color:#fff;}

table{width:100%;border-collapse:collapse;font-size:12px;}
td,th{padding:6px;border-bottom:1px solid #eee;}

.section{display:none;}
.active{display:block;}

.bottom{position:fixed;bottom:0;left:0;right:0;display:flex;background:#fff;}
.bottom div{flex:1;text-align:center;padding:10px;font-size:12px;}
.center{background:#111;color:#fff;border-radius:50%;width:60px;height:60px;display:flex;align-items:center;justify-content:center;position:relative;top:-15px;margin:auto;}
</style>
</head>

<body>

<header>📦 POS Kho Vải Pro</header>

<div class="nav">
<div onclick="show('home')">Trang chủ</div>
<div onclick="show('warehouse')">Kho</div>
<div onclick="show('sell')">Bán</div>
<div onclick="show('report')">Báo cáo</div>
</div>

<div class="container">

<!-- HOME -->
<div id="home" class="section active">
<div class="card">
<h3>Dashboard</h3>
<p>Tổng sản phẩm: <span id="totalStock"></span></p>
<p>Tổng đơn hàng: <span id="totalOrders"></span></p>
</div>
</div>

<!-- WAREHOUSE -->
<div id="warehouse" class="section">
<div class="card">
<h3>Nhập kho</h3>
<input id="name" placeholder="Tên"/>
<input id="code" placeholder="Mã"/>
<input id="color" placeholder="Màu"/>
<input id="price" placeholder="Giá bán"/>
<input id="qty" placeholder="Số mét"/>
<button onclick="add()">Thêm</button>
</div>

<div class="card">
<h3>Kho hàng</h3>
<table><tbody id="stock"></tbody></table>
</div>
</div>

<!-- SELL -->
<div id="sell" class="section">
<div class="card">
<h3>Bán hàng (giỏ)</h3>
<table><tbody id="cart"></tbody></table>
<p>Tổng: <span id="total"></span></p>
<button onclick="checkout()">Thanh toán</button>
</div>
</div>

<!-- REPORT -->
<div id="report" class="section">
<div class="card">
<h3>Hoá đơn</h3>
<table><tbody id="orders"></tbody></table>
</div>
</div>

</div>

<script>

let stock = JSON.parse(localStorage.getItem('stock')||'[]');
let cart = [];
let orders = JSON.parse(localStorage.getItem('orders')||'[]');

function save(){
localStorage.setItem('stock',JSON.stringify(stock));
localStorage.setItem('orders',JSON.stringify(orders));
}

function add(){
stock.push({
name:name.value,
code:code.value,
color:color.value,
price:+price.value,
qty:+qty.value
});
save(); render();
}

function addToCart(i){
if(stock[i].qty<=0) return;
stock[i].qty--;
cart.push(stock[i]);
render();
}

function checkout(){
let total = cart.reduce((s,i)=>s+i.price,0);
orders.push({items:cart,total,date:new Date().toLocaleString()});
cart=[];
save(); render();
alert("Đã thanh toán");
}

function render(){

let st = document.getElementById('stock');
st.innerHTML='';
stock.forEach((i,idx)=>{
st.innerHTML+=`
<tr>
<td>${i.name}</td>
<td>${i.qty}</td>
<td><button onclick="addToCart(${idx})">Bán</button></td>
</tr>`;
});

let c = document.getElementById('cart');
c.innerHTML='';
let total=0;
cart.forEach(i=>{
total+=i.price;
c.innerHTML+=`<tr><td>${i.name}</td><td>${i.price}</td></tr>`;
});
document.getElementById('total').innerText=total;

let o = document.getElementById('orders');
o.innerHTML='';
orders.forEach(i=>{
o.innerHTML+=`<tr><td>${i.date}</td><td>${i.total}</td></tr>`;
});

document.getElementById('totalStock').innerText=stock.length;
document.getElementById('totalOrders').innerText=orders.length;
}

function show(id){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

render();

</script>

</body>
</html>
