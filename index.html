<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kho Vải TD - Quản Lý Tồn Kho</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        .hidden { display: none; }
        .active-tab { color: #2563eb; border-bottom: 3px solid #2563eb; }
        .card { background: white; border-radius: 1.5rem; padding: 1.25rem; box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
        .scroll-custom::-webkit-scrollbar { width: 4px; }
        .scroll-custom::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .invoice-box { border: 2px dashed #000; padding: 1.5rem; background: #fff; font-family: 'Courier New', monospace; }
    </style>
</head>
<body class="bg-[#F1F5F9] pb-28 text-slate-800">

    <div class="max-w-md mx-auto bg-white border-b sticky top-0 z-50 shadow-sm">
        <div class="p-4 flex justify-between items-center">
            <div>
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Hệ thống Quản lý</p>
                <h1 class="text-xl font-black text-blue-700 italic uppercase">Kho Vải TD</h1>
            </div>
            <span class="text-[10px] bg-blue-100 text-blue-700 px-2 py-1 rounded-full font-bold">V11 - STOCK PRO</span>
        </div>
        <div class="flex justify-around text-[10px] font-black uppercase tracking-wider border-t overflow-x-auto">
            <button onclick="switchTab('pos')" id="btn-pos" class="tab-btn py-4 px-3 active-tab">Bán Hàng</button>
            <button onclick="switchTab('stock-view')" id="btn-stock-view" class="tab-btn py-4 px-3 text-slate-400">Kho Hàng</button>
            <button onclick="switchTab('stock-in')" id="btn-stock-in" class="tab-btn py-4 px-3 text-slate-400">Nhập Kho</button>
            <button onclick="switchTab('report')" id="btn-report" class="tab-btn py-4 px-3 text-slate-400">Báo Cáo</button>
        </div>
    </div>

    <div class="max-w-md mx-auto p-4 space-y-4">

        <section id="tab-pos" class="tab-content space-y-4">
            <div class="card space-y-4">
                <div class="flex justify-between items-center border-b pb-2">
                    <h3 class="font-bold text-blue-700 uppercase text-xs">Cắt Vải</h3>
                    <span id="pos-stock-tag" class="text-[10px] font-black text-orange-600 bg-orange-50 px-2 py-1 rounded-lg"></span>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-400 ml-1 uppercase">Loại vải</label>
                        <select id="sellProduct" onchange="loadVariants()" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 font-bold text-sm"></select>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-400 ml-1 uppercase">Mã / Màu</label>
                        <select id="sellVariant" onchange="updatePrice()" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 font-bold text-sm"></select>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-400 ml-1 uppercase">Số mét cắt</label>
                        <input id="met" type="number" step="0.01" placeholder="0.00" oninput="updatePrice()" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 font-black text-lg text-blue-600">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-400 ml-1 uppercase">Thành tiền</label>
                        <div id="totalShow" class="w-full bg-blue-50 border border-blue-100 rounded-xl p-3 font-black text-blue-700 text-lg">0đ</div>
                    </div>
                </div>
                <button onclick="addCart()" class="w-full bg-blue-700 text-white py-4 rounded-2xl font-black shadow-lg shadow-blue-200 active:scale-95 transition uppercase tracking-widest text-sm">Thêm Vào Đơn</button>
            </div>

            <div class="card space-y-4">
                <div id="cart" class="space-y-2 max-h-52 overflow-y-auto scroll-custom"></div>
                <div class="pt-3 border-t space-y-3">
                    <div class="grid grid-cols-2 gap-2">
                        <input id="custName" type="text" placeholder="Tên khách" class="border border-slate-200 rounded-xl p-3 text-sm bg-slate-50 font-medium">
                        <input id="custPhone" type="text" placeholder="Số điện thoại" class="border border-slate-200 rounded-xl p-3 text-sm bg-slate-50 font-medium">
                    </div>
                    <div class="flex justify-between items-center px-1">
                        <span class="text-slate-400 font-bold text-[10px] uppercase">Tổng cộng:</span>
                        <span id="sum" class="text-2xl font-black text-red-600">0đ</span>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="checkout(false)" class="flex-1 bg-green-600 text-white py-4 rounded-2xl font-black uppercase text-[10px] shadow-md shadow-green-100">Tiền Mặt</button>
                        <button onclick="checkout(true)" class="flex-1 bg-slate-800 text-white py-4 rounded-2xl font-black uppercase text-[10px]">Ghi Nợ</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="tab-stock-view" class="tab-content hidden space-y-4">
            <div class="grid grid-cols-2 gap-3">
                <div class="card bg-white border border-blue-100">
                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Tổng tồn kho</p>
                    <p id="totalStockMet" class="text-xl font-black text-blue-700">0m</p>
                </div>
                <div class="card bg-white border border-green-100">
                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Giá trị vốn</p>
                    <p id="totalStockValue" class="text-xl font-black text-green-600">0đ</p>
                </div>
            </div>

            <div class="card space-y-4">
                <div class="flex justify-between items-center border-b pb-2">
                    <h3 class="font-black text-slate-800 uppercase text-[10px] tracking-widest">Danh sách hàng trong kho</h3>
                    <input type="text" id="stockSearch" oninput="renderStockView()" placeholder="Tìm mã/vải..." class="text-[10px] border rounded-lg px-2 py-1 w-24 bg-slate-50">
                </div>
                <div id="stockListContent" class="space-y-3 max-h-[50vh] overflow-y-auto scroll-custom">
                    </div>
            </div>
        </section>

        <section id="tab-stock-in" class="tab-content hidden space-y-4">
            <div class="card space-y-4 border-l-4 border-blue-500">
                <h3 class="font-black text-blue-700 uppercase text-xs">1. Chọn/Thêm Loại Vải</h3>
                <div class="flex gap-2">
                    <select id="pselect" class="flex-1 border border-slate-200 p-3 rounded-xl bg-slate-50 font-black text-sm"></select>
                    <button onclick="promptAddProduct()" class="bg-blue-600 text-white px-4 rounded-xl font-bold text-xs">+</button>
                </div>
            </div>
            <div class="card space-y-4">
                <h3 class="font-black text-orange-600 uppercase text-xs">2. Chi Tiết Mã Hàng</h3>
                <div class="grid grid-cols-2 gap-2">
                    <input id="code" type="text" placeholder="Mã (L01)" class="border border-slate-200 p-3 rounded-xl text-sm font-bold bg-slate-50">
                    <input id="color" type="text" placeholder="Màu sắc" class="border border-slate-200 p-3 rounded-xl text-sm font-bold bg-slate-50">
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <input id="price" type="number" placeholder="Giá bán/m" class="border border-slate-200 p-3 rounded-xl text-sm font-black bg-slate-50">
                    <input id="stock" type="number" placeholder="Số mét tồn" class="border border-slate-200 p-3 rounded-xl text-sm font-black bg-slate-50">
                </div>
                <button onclick="addVariantToTemp()" class="w-full bg-slate-100 text-slate-700 py-3 rounded-xl font-bold uppercase text-[10px]">+ Thêm vào danh sách chờ</button>
                
                <div id="tempVariantList" class="space-y-2 border-t pt-3 hidden">
                    <div id="tempListContent" class="space-y-2"></div>
                    <button onclick="commitVariants()" class="w-full bg-orange-500 text-white py-4 rounded-2xl font-black uppercase shadow-lg text-xs mt-2">XÁC NHẬN NHẬP KHO</button>
                </div>
            </div>
        </section>

        <section id="tab-report" class="tab-content hidden space-y-4">
            <div class="grid grid-cols-2 gap-3">
                <div class="card bg-blue-700 text-white">
                    <p class="text-[9px] font-bold opacity-70 uppercase tracking-widest">Hôm nay</p>
                    <p id="today" class="text-xl font-black">0đ</p>
                </div>
                <div class="card bg-white border">
                    <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Tháng này</p>
                    <p id="month" class="text-xl font-black">0đ</p>
                </div>
            </div>
            <div class="card space-y-3">
                <h3 class="font-black border-b pb-2 uppercase text-[10px] text-blue-700">Đơn hàng mới</h3>
                <div id="billHistory" class="space-y-2 max-h-40 overflow-y-auto scroll-custom"></div>
            </div>
            <div class="card space-y-3">
                <h3 class="font-black border-b pb-2 uppercase text-[10px] text-red-500">Khách nợ</h3>
                <div id="customerList" class="space-y-2"></div>
            </div>
            <div class="flex gap-2">
                <button onclick="exportData()" class="flex-1 bg-white border py-3 rounded-xl text-[10px] font-black uppercase text-slate-500">Sao Lưu</button>
                <button onclick="clearAllData()" class="flex-1 bg-red-50 text-red-400 py-3 rounded-xl text-[10px] font-black uppercase">Xóa hết</button>
            </div>
        </section>

        <div id="modal-invoice" class="fixed inset-0 bg-slate-900/90 z-[60] hidden flex items-center justify-center p-4">
            <div class="bg-white w-full rounded-3xl p-6 space-y-4 max-h-[90vh] overflow-y-auto relative">
                <button onclick="closeInvoice()" class="absolute top-4 right-4 text-slate-300 text-3xl">×</button>
                <div id="invoice-content" class="invoice-box"></div>
                <button onclick="closeInvoice()" class="w-full bg-blue-700 text-white py-4 rounded-2xl font-black uppercase text-xs">Đóng</button>
            </div>
        </div>
    </div>

    <script>
        let products = JSON.parse(localStorage.getItem("td_v11_products") || "[]");
        let bills = JSON.parse(localStorage.getItem("td_v11_bills") || "[]");
        let customers = JSON.parse(localStorage.getItem("td_v11_customers") || "[]");
        let cart = [], tempVariants = [];

        function save() {
            localStorage.setItem("td_v11_products", JSON.stringify(products));
            localStorage.setItem("td_v11_bills", JSON.stringify(bills));
            localStorage.setItem("td_v11_customers", JSON.stringify(customers));
        }

        function f(n) { return (n || 0).toLocaleString("vi-VN"); }

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById('tab-' + id).classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab', 'text-slate-400'));
            document.getElementById('btn-' + id).classList.add('active-tab');
            render();
            if(id === 'pos') loadVariants();
            if(id === 'stock-view') renderStockView();
        }

        // --- XEM TỒN KHO ---
        function renderStockView() {
            let search = document.getElementById("stockSearch").value.toLowerCase();
            let container = document.getElementById("stockListContent");
            let totalMet = 0, totalValue = 0;
            let html = "";

            products.forEach((p, pIdx) => {
                let filteredVariants = p.variants.filter(v => 
                    v.code.toLowerCase().includes(search) || 
                    v.color.toLowerCase().includes(search) || 
                    p.name.toLowerCase().includes(search)
                );

                if(filteredVariants.length > 0) {
                    html += `<div class="space-y-2"><p class="text-[10px] font-black text-blue-700 bg-blue-50 px-2 py-1 rounded-md uppercase">${p.name}</p>`;
                    filteredVariants.forEach((v, vIdx) => {
                        totalMet += v.stock;
                        totalValue += (v.stock * v.price);
                        let isLow = v.stock < 5;
                        html += `
                        <div class="flex justify-between items-center bg-white border border-slate-100 p-3 rounded-xl shadow-sm">
                            <div>
                                <p class="font-bold text-xs">${v.code} - ${v.color}</p>
                                <p class="text-[9px] text-slate-400">Giá bán: ${f(v.price)}đ/m</p>
                            </div>
                            <div class="text-right">
                                <p class="font-black text-sm ${isLow ? 'text-red-500' : 'text-slate-700'}">${v.stock}m</p>
                                ${isLow ? '<p class="text-[8px] font-bold text-red-400 uppercase">Sắp hết!</p>' : ''}
                            </div>
                        </div>`;
                    });
                    html += `</div>`;
                }
            });

            container.innerHTML = html || '<p class="text-center text-slate-300 py-10 text-xs italic">Không tìm thấy hàng</p>';
            document.getElementById("totalStockMet").innerText = totalMet.toFixed(1) + "m";
            document.getElementById("totalStockValue").innerText = f(totalValue) + "đ";
        }

        // --- NHẬP KHO ---
        function promptAddProduct() {
            let name = prompt("Tên loại vải mới:");
            if(name) { products.push({name: name.trim(), variants: []}); save(); render(); }
        }

        function addVariantToTemp() {
            let pIdx = document.getElementById("pselect").value;
            let code = document.getElementById("code").value.trim();
            let color = document.getElementById("color").value.trim();
            let price = parseFloat(document.getElementById("price").value) || 0;
            let stock = parseFloat(document.getElementById("stock").value) || 0;
            if(pIdx === "" || !code) return alert("Nhập đủ mã hàng!");
            tempVariants.push({ code, color, price, stock });
            ["code", "color", "price", "stock"].forEach(id => document.getElementById(id).value = "");
            renderTempList();
        }

        function renderTempList() {
            let container = document.getElementById("tempVariantList");
            let content = document.getElementById("tempListContent");
            if(tempVariants.length > 0) {
                container.classList.remove("hidden");
                content.innerHTML = tempVariants.map((v, i) => `
                    <div class="flex justify-between items-center bg-slate-50 p-2 rounded-lg border text-[10px]">
                        <span class="font-bold">${v.code} - ${v.color} (${v.stock}m)</span>
                        <button onclick="tempVariants.splice(${i},1);renderTempList();" class="text-red-500 font-black px-2">×</button>
                    </div>
                `).join('');
            } else container.classList.add("hidden");
        }

        function commitVariants() {
            let pIdx = document.getElementById("pselect").value;
            tempVariants.forEach(v => products[pIdx].variants.push({...v}));
            tempVariants = []; save(); render(); renderTempList();
            alert("Đã nhập kho xong!");
        }

        // --- BÁN HÀNG ---
        function loadVariants() {
            let pIdx = document.getElementById("sellProduct").value;
            let vSel = document.getElementById("sellVariant");
            vSel.innerHTML = "";
            if(pIdx !== "" && products[pIdx]?.variants.length) {
                products[pIdx].variants.forEach((v, i) => {
                    vSel.innerHTML += `<option value="${i}">${v.code} - ${v.color} (${v.stock}m)</option>`;
                });
            } else vSel.innerHTML = '<option value="">(Trống)</option>';
            updatePrice();
        }

        function updatePrice() {
            let pIdx = document.getElementById("sellProduct").value;
            let vIdx = document.getElementById("sellVariant").value;
            let met = parseFloat(document.getElementById("met").value) || 0;
            if(pIdx !== "" && vIdx !== "" && products[pIdx]?.variants[vIdx]) {
                let v = products[pIdx].variants[vIdx];
                document.getElementById("totalShow").innerText = f(v.price * met) + "đ";
                document.getElementById("pos-stock-tag").innerText = "TỒN: " + v.stock + "M";
            } else {
                document.getElementById("totalShow").innerText = "0đ";
                document.getElementById("pos-stock-tag").innerText = "";
            }
        }

        function addCart() {
            let pIdx = document.getElementById("sellProduct").value;
            let vIdx = document.getElementById("sellVariant").value;
            let met = parseFloat(document.getElementById("met").value) || 0;
            if(pIdx==="" || vIdx==="" || met<=0) return;
            let v = products[pIdx].variants[vIdx];
            if(met > v.stock) return alert("Hàng trong kho không đủ!");
            cart.push({ product: products[pIdx].name, code: v.code, color: v.color, qty: met, price: v.price, total: v.price * met, pIdx, vIdx });
            document.getElementById("met").value = "";
            render();
        }

        function checkout(isDebt) {
            if(!cart.length) return;
            let name = document.getElementById("custName").value.trim() || "Khách lẻ";
            let phone = document.getElementById("custPhone").value.trim();
            let total = cart.reduce((a, b) => a + b.total, 0);

            cart.forEach(item => {
                products[item.pIdx].variants[item.vIdx].stock = Number((products[item.pIdx].variants[item.vIdx].stock - item.qty).toFixed(2));
            });

            if(isDebt) {
                let c = customers.find(x => x.phone === phone && phone !== "");
                if(c) { c.debt += total; c.name = name; }
                else customers.push({name, phone, debt: total});
            }

            let bill = { id: Date.now(), time: new Date().toISOString(), name, phone, items: [...cart], total, isDebt };
            bills.push(bill);
            showInvoice(bill);
            cart = []; 
            ["custName", "custPhone"].forEach(id => document.getElementById(id).value = "");
            save(); render(); loadVariants();
        }

        function showInvoice(bill) {
            let dateStr = new Date(bill.time).toLocaleString('vi-VN');
            document.getElementById("invoice-content").innerHTML = `
                <div style="text-align:center; border-bottom:2px solid #000; padding-bottom:10px; margin-bottom:10px;">
                    <h2 style="margin:0; font-size:16px;">KHO VẢI TD</h2>
                </div>
                <div style="font-size:11px; margin-bottom:10px;">
                    <p><b>Khách:</b> ${bill.name}</p>
                    <p><b>Ngày:</b> ${dateStr}</p>
                </div>
                <table style="width:100%; font-size:11px; border-collapse: collapse;">
                    ${bill.items.map(i => `<tr style="border-bottom:1px dashed #eee">
                        <td style="padding:5px 0">${i.product} (${i.code})<br>${i.qty}m x ${f(i.price)}</td>
                        <td style="text-align:right"><b>${f(i.total)}</b></td>
                    </tr>`).join('')}
                </table>
                <div style="text-align:right; font-weight:900; font-size:14px; margin-top:10px; border-top:1px solid #000;">TỔNG: ${f(bill.total)}đ</div>
            `;
            document.getElementById("modal-invoice").classList.remove("hidden");
        }

        function closeInvoice() { document.getElementById("modal-invoice").classList.add("hidden"); }

        function render() {
            let pS = document.getElementById("pselect"), sP = document.getElementById("sellProduct");
            let opts = products.map((p, i) => `<option value="${i}">${p.name}</option>`).join('');
            pS.innerHTML = opts || '<option value="">(Trống)</option>'; 
            sP.innerHTML = opts || '<option value="">(Trống)</option>';

            let cartDiv = document.getElementById("cart");
            let t = 0;
            cartDiv.innerHTML = cart.length ? cart.map((c, i) => {
                t += c.total;
                return `<div class="flex justify-between items-center bg-slate-50 p-3 rounded-xl border border-slate-100">
                    <div><p class="font-bold text-xs">${c.product} - ${c.code}</p><p class="text-[9px] text-slate-400">${c.qty}m x ${f(c.price)}</p></div>
                    <div class="flex items-center gap-3"><span class="font-black text-sm text-blue-700">${f(c.total)}</span><button onclick="cart.splice(${i},1);render();" class="text-red-400 px-1 text-xl">×</button></div>
                </div>`;
            }).join('') : '<p class="text-center text-slate-300 py-4 text-[10px]">Giỏ hàng trống</p>';
            document.getElementById("sum").innerText = f(t) + "đ";

            let todayTotal = 0, monthTotal = 0, now = new Date();
            let historyHTML = "";
            bills.slice().reverse().forEach(b => {
                let d = new Date(b.time);
                if(d.toDateString() === now.toDateString()) {
                    todayTotal += b.total;
                    historyHTML += `<div class="flex justify-between items-center p-2 bg-slate-50 rounded-lg text-[10px] border mb-1">
                        <span><b>${b.name}</b>: ${f(b.total)}đ</span>
                        <button onclick='showInvoice(${JSON.stringify(b)})' class="text-blue-600 font-bold uppercase">Xem</button>
                    </div>`;
                }
                if(d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear()) monthTotal += b.total;
            });
            document.getElementById("today").innerText = f(todayTotal) + "đ";
            document.getElementById("month").innerText = f(monthTotal) + "đ";
            document.getElementById("billHistory").innerHTML = historyHTML || '<p class="text-center text-slate-300 text-[10px]">Trống</p>';

            document.getElementById("customerList").innerHTML = customers.filter(c => c.debt > 0).map(c => 
                `<div class="flex justify-between items-center p-2 bg-red-50 rounded-lg text-[10px] border border-red-100">
                    <span><b>${c.name}</b>: <span class="text-red-600 font-black">${f(c.debt)}đ</span></span>
                    <button onclick="payDebt('${c.phone}')" class="bg-green-600 text-white px-2 py-0.5 rounded">Trả nợ</button>
                </div>`
            ).join('') || '<p class="text-center text-slate-300 text-[10px]">Trống</p>';
        }

        function payDebt(phone) {
            let amount = parseFloat(prompt("Số tiền khách trả:"));
            if(!isNaN(amount) && amount > 0) {
                let c = customers.find(x => x.phone === phone);
                c.debt = Math.max(0, c.debt - amount); save(); render();
            }
        }

        function exportData() {
            const blob = new Blob([JSON.stringify({products, bills, customers})], {type: "application/json"});
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = `KhoVaiTD_BackUp.json`;
            a.click();
        }

        function clearAllData() { if(confirm("Xóa sạch dữ liệu?")) { localStorage.clear(); location.reload(); } }

        render();
        loadVariants();
    </script>
</body>
</html>
