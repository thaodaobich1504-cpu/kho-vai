<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kho Vải PRO</title>

<style>
body{font-family:-apple-system;margin:0;background:#f5f6fa}

/* HEADER */
.header{background:white;padding:15px}
.title{font-size:18px;font-weight:bold}
.sub{color:#666;font-size:13px}

/* CARD */
.card{background:white;margin:10px;padding:15px;border-radius:12px}

/* INPUT */
input,select{
width:100%;padding:10px;margin-top:5px;
border-radius:8px;border:1px solid #ddd
}

/* BUTTON */
button{
width:100%;
padding:10px;margin-top:8px;
border:none;background:#2f80ed;color:white;
border-radius:8px
}

/* TAB */
.bottom{
position:fixed;bottom:0;width:100%;
display:flex;justify-content:space-around;
background:white;padding:10px 0;
border-top:1px solid #ddd
}
.center{
width:65px;height:65px;background:#2f80ed;
color:white;border-radius:50%;
display:flex;align-items:center;justify-content:center;
margin-top:-30px;font-size:14px
}

.hidden{display:none}
</style>
</head>

<body>

<div class="header">
<div class="title">👋 Xin chào Thảo</div>
<div class="sub">Kho nội bộ</div>
</div>

<!-- HOME -->
<div id="home">
<div class="card">
📊 Doanh thu: <b id="rev">0</b><br>
📦 Đơn hàng: <b id="ord">0</b><br>
🧾 Hóa đơn: <b id="inv">0</b>
</div>
</div>

<!-- KHO -->
<div id="kho" class="hidden">
<div class="card">
📦 Nhập hàng<br>
<input id="code" placeholder="Mã hàng">
<input id="name" placeholder="Tên vải">
<input id="color" placeholder="Màu">
<input id="import" type="number" step="0.01" placeholder="Giá nhập">
<input id="price" type="number" step="0.01" placeholder="Giá bán">
<input id="qty" type="number" step="0.01" placeholder="Số mét">
<button onclick="add()">Thêm sản phẩm</button>
</div>
<div id="list"></div>
</div>

<!-- BÁN -->
<div id="sell" class="hidden">
<div class="card">
🛒 Bán hàng<br>

<select id="product" onchange="loadProduct()"></select>

<input id="showColor" placeholder="Màu" disabled>
<input id="showPrice" placeholder="Giá bán" disabled>

<input id="met" type="number" step="0.01" placeholder="Số mét">
<input id="total" placeholder="Thành tiền" disabled>

<button onclick="addCart()">Thêm vào đơn</button>
<button onclick="checkout()">Thanh toán</button>
</div>

<div id="cart"></div>
</div>

<!-- KHÁCH -->
<div id="customer" class="hidden">
<div class="card">
👤 Khách hàng<br>
<input id="cname" placeholder="Tên">
<input id="phone" placeholder="SĐT">
<button onclick="addCustomer()">Lưu khách</button>
</div>
<div id="clist"></div>
</div>

<!-- BÁO CÁO -->
<div id="report" class="hidden">
<div class="card">
📊 Báo cáo<br>
Hôm nay: <b id="today">0</b><br>
Tháng: <b id="month">0</b>
</div>
</div>

<!-- TAB -->
<div class="bottom">
<div onclick="tab('home')">Trang chủ</div>
<div onclick="tab('kho')">Kho</div>
<div class="center" onclick="tab('sell')">Bán</div>
<div onclick="tab('customer')">Khách</div>
<div onclick="tab('report')">Báo cáo</div>
</div>

<script>
let products=JSON.parse(localStorage.getItem("p")||"[]");
let bills=JSON.parse(localStorage.getItem("b")||"[]");
let customers=JSON.parse(localStorage.getItem("c")||"[]");
let cart=[];

function save(){
localStorage.setItem("p",JSON.stringify(products));
localStorage.setItem("b",JSON.stringify(bills));
localStorage.setItem("c",JSON.stringify(customers));
}

function format(n){return n.toLocaleString("vi-VN");}

function tab(id){
["home","kho","sell","customer","report"].forEach(x=>{
document.getElementById(x).classList.add("hidden")
});
document.getElementById(id).classList.remove("hidden");
render();
}

/* KHO */
function add(){
products.push({
id:Date.now(),
code:code.value,
name:name.value,
color:color.value,
import:+import.value,
price:+price.value,
stock:+qty.value
});
save();render();
}

/* BÁN */
function loadProduct(){
let p=products[product.value];
showColor.value=p.color;
showPrice.value=format(p.price);
}

met.oninput=function(){
let p=products[product.value];
total.value=format(p.price * met.value);
}

function addCart(){
let p=products[product.value];
let m=parseFloat(met.value);

cart.push({
name:p.name,
qty:m,
total:p.price*m
});
render();
}

function checkout(){
let sum=cart.reduce((a,b)=>a+b.total,0);
bills.push({time:new Date(),total:sum});

cart=[];
save();render();
}

/* KHÁCH */
function addCustomer(){
customers.push({name:cname.value,phone:phone.value});
save();render();
}

/* RENDER */
function render(){

/* PRODUCT SELECT */
product.innerHTML="";
products.forEach((p,i)=>{
product.innerHTML+=`<option value="${i}">${p.name} - ${p.color}</option>`;
});

/* LIST */
list.innerHTML="";
products.forEach(p=>{
list.innerHTML+=`<div class="card">${p.code} - ${p.name} (${p.color}) - ${p.stock}m</div>`;
});

/* CUSTOMER */
clist.innerHTML="";
customers.forEach(c=>{
clist.innerHTML+=`<div class="card">${c.name} - ${c.phone}</div>`;
});

/* DASH */
let rev=0;
bills.forEach(b=>rev+=b.total);
rev.innerText=format(rev);
ord.innerText=bills.length;
inv.innerText=bills.length;

/* REPORT */
let todayVal=0,monthVal=0;
let now=new Date();

bills.forEach(b=>{
let d=new Date(b.time);
if(d.toDateString()==now.toDateString()) todayVal+=b.total;
if(d.getMonth()==now.getMonth()) monthVal+=b.total;
});

today.innerText=format(todayVal);
month.innerText=format(monthVal);

/* CART */
cart.innerHTML="";
cart.forEach(c=>{
cart.innerHTML+=`<div class="card">${c.name} - ${c.qty}m - ${format(c.total)}</div>`;
});
}

render();
</script>

</body>
</html>
