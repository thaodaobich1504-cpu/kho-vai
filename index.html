<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hệ thống quản lý nội bộ PRO</title>

<style>
body{margin:0;font-family:Arial;background:#f5f6f8}
.header{background:#0f172a;color:#fff;padding:14px;text-align:center;font-size:18px}
.container{padding:10px}

.card{background:#fff;padding:10px;border-radius:10px;margin-bottom:10px;box-shadow:0 2px 6px rgba(0,0,0,.08)}

input,select,button{
width:100%;padding:10px;margin-top:6px;margin-bottom:10px;
border-radius:8px;border:1px solid #ddd
}

button{background:#2563eb;color:#fff;border:none}
button.red{background:#dc2626}
button.green{background:#16a34a}

.tabbar{
position:fixed;bottom:0;left:0;right:0;
display:flex;background:#fff;border-top:1px solid #ddd
}
.tabbar button{flex:1;font-size:11px;background:none;color:#333}

.tab{display:none}
.tab.active{display:block}

.item{padding:8px 0;border-bottom:1px solid #eee}
.small{font-size:12px;color:#666}
hr{border:none;border-top:1px solid #eee}
</style>
</head>

<body>

<div class="header">Hệ thống quản lý nội bộ PRO</div>

<div class="container">

<!-- HOME -->
<div id="home" class="tab active">
<div class="card">
<h3>Báo cáo tổng quan</h3>
<div id="report"></div>
</div>
</div>

<!-- KHO -->
<div id="kho" class="tab">
<div class="card">
<h3>Nhập hàng</h3>
<input id="ten" placeholder="Tên vải">
<input id="ma" placeholder="Mã SKU">
<input id="met" type="number" step="0.01" placeholder="Số mét">
<input id="giaNhap" type="number" step="0.01" placeholder="Giá nhập/m">
<input id="giaBan" type="number" step="0.01" placeholder="Giá bán/m">
<button onclick="addStock()">Thêm kho</button>
</div>

<div class="card">
<h3>Kho hàng</h3>
<div id="stockList"></div>
</div>
</div>

<!-- BÁN -->
<div id="ban" class="tab">
<div class="card">
<h3>Bán hàng</h3>
<select id="sellSelect"></select>
<input id="sellMet" type="number" step="0.01" placeholder="Số mét bán">
<button onclick="sell()">Xác nhận bán</button>
</div>

<div class="card">
<h3>Giao dịch</h3>
<div id="saleList"></div>
</div>
</div>

<!-- CÔNG NỢ -->
<div id="no" class="tab">
<div class="card">
<h3>Công nợ khách hàng</h3>
<input id="cusName" placeholder="Tên khách hàng">
<input id="debtMoney" type="number" step="0.01" placeholder="Số tiền nợ">
<button onclick="addDebt()">Ghi nợ</button>
</div>

<div class="card">
<h3>Danh sách công nợ</h3>
<div id="debtList"></div>
</div>
</div>

<!-- HOÁ ĐƠN -->
<div id="bill" class="tab">
<div class="card">
<h3>In hoá đơn</h3>
<select id="billSelect"></select>
<input id="billMet" type="number" step="0.01" placeholder="Số mét">
<button onclick="printBill()">In hoá đơn</button>
</div>
</div>

<!-- SETTING -->
<div id="set" class="tab">
<div class="card">
<h3>Backup</h3>
<button class="green" onclick="backup()">Xuất dữ liệu</button>
<input type="file" onchange="restore(event)">
</div>
<div class="card">
<button class="red" onclick="resetAll()">Reset</button>
</div>
</div>

</div>

<!-- TAB -->
<div class="tabbar">
<button onclick="tab('home')">Home</button>
<button onclick="tab('kho')">Kho</button>
<button onclick="tab('ban')">Bán</button>
<button onclick="tab('no')">Công nợ</button>
<button onclick="tab('bill')">Hoá đơn</button>
<button onclick="tab('set')">Cài đặt</button>
</div>

<script>

let db = {
stock: [],
sales: [],
debt: []
};

function safeNum(v){return isNaN(parseFloat(v))?0:parseFloat(v)}

function save(){
localStorage.setItem("PRO_APP", JSON.stringify(db))
render()
}

function load(){
let d = localStorage.getItem("PRO_APP")
if(d) db = JSON.parse(d)
}
load()

// -------- KHO ----------
function addStock(){
let ten = document.getElementById("ten").value
let ma = document.getElementById("ma").value
let met = safeNum(document.getElementById("met").value)
let giaNhap = safeNum(document.getElementById("giaNhap").value)
let giaBan = safeNum(document.getElementById("giaBan").value)

if(!ma || !ten) return alert("Thiếu dữ liệu")

let ex = db.stock.find(x=>x.ma===ma)
if(ex){
ex.met += met
ex.giaBan = giaBan
ex.giaNhap = giaNhap
}else{
db.stock.push({ten,ma,met,giaNhap,giaBan})
}
save()
}

// -------- BÁN ----------
function sell(){
let ma = document.getElementById("sellSelect").value
let met = safeNum(document.getElementById("sellMet").value)

let p = db.stock.find(x=>x.ma===ma)
if(!p) return alert("Không tồn tại")

if(p.met < met) return alert("Không đủ kho")

p.met -= met

db.sales.push({
ma,
met,
total: met * p.giaBan,
time: new Date().toLocaleString()
})

save()
}

// -------- CÔNG NỢ ----------
function addDebt(){
db.debt.push({
name: cusName.value,
money: safeNum(debtMoney.value),
paid:0
})
save()
}

// -------- IN ----------
function printBill(){
let ma = billSelect.value
let met = safeNum(billMet.value)
let p = db.stock.find(x=>x.ma===ma)
if(!p) return

let total = met * p.giaBan

let w = window.open("")
w.document.write(`
<h2>HOÁ ĐƠN BÁN HÀNG</h2>
<p>SP: ${p.ten}</p>
<p>Mã: ${p.ma}</p>
<p>Số mét: ${met}</p>
<p>Đơn giá: ${p.giaBan}</p>
<h3>Tổng: ${total.toFixed(2)}</h3>
`)
w.print()
}

// -------- BACKUP ----------
function backup(){
let b = new Blob([JSON.stringify(db)],{type:"application/json"})
let a = document.createElement("a")
a.href = URL.createObjectURL(b)
a.download = "backup.json"
a.click()
}

function restore(e){
let r = new FileReader()
r.onload = e=>{
db = JSON.parse(e.target.result)
save()
}
r.readAsText(e.target.files[0])
}

function resetAll(){
if(confirm("Xoá hết?")){
db = {stock:[],sales:[],debt:[]}
save()
}
}

// -------- RENDER ----------
function render(){

stockList.innerHTML = db.stock.map(x=>
`<div class="item"><b>${x.ten}</b> (${x.ma})<br>
<span class="small">${x.met.toFixed(2)}m | ${x.giaBan}/m</span></div>`
).join("")

saleList.innerHTML = db.sales.map(x=>
`<div class="item">${x.ma} - ${x.met}m<br>
<span class="small">${x.total.toFixed(2)} | ${x.time}</span></div>`
).join("")

debtList.innerHTML = db.debt.map(x=>
`<div class="item">${x.name} - ${x.money}</div>`
).join("")

sellSelect.innerHTML = db.stock.map(x=>
`<option value="${x.ma}">${x.ten}</option>`
).join("")

billSelect.innerHTML = db.stock.map(x=>
`<option value="${x.ma}">${x.ten}</option>`
).join("")

let totalSale = db.sales.reduce((a,b)=>a+b.total,0)
let totalStock = db.stock.reduce((a,b)=>a+b.met,0)
let totalDebt = db.debt.reduce((a,b)=>a+b.money,0)

report.innerHTML = `
<p>Tồn kho: <b>${totalStock.toFixed(2)} m</b></p>
<p>Doanh thu: <b>${totalSale.toFixed(2)}</b></p>
<p>Công nợ: <b>${totalDebt.toFixed(2)}</b></p>
`
}

function tab(id){
document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"))
document.getElementById(id).classList.add("active")
}

load()
render()

</script>

</body>
</html>
