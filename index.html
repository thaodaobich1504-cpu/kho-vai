<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kho Vải PRO MAX</title>

<style>
body{font-family:-apple-system;margin:0;background:#f2f4f8}

/* HEADER */
.header{background:white;padding:15px}
.title{font-size:20px;font-weight:bold}
.sub{color:#666;font-size:13px}

/* CARD */
.card{background:white;margin:10px;padding:15px;border-radius:12px}

/* INPUT */
input,select{
width:100%;padding:10px;margin-top:5px;
border-radius:8px;border:1px solid #ddd
}

/* BUTTON */
button{
padding:10px;margin-top:8px;border:none;
background:#2f80ed;color:white;border-radius:8px
}

/* GRID */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:10px;
margin-bottom:260px;
}

.item{background:white;padding:10px;border-radius:10px}

/* CART */
.cart{
position:fixed;
bottom:70px;left:0;right:0;
background:white;padding:10px;
border-top:1px solid #ddd;
max-height:250px;overflow:auto
}

/* TAB */
.bottom{
position:fixed;bottom:0;width:100%;
display:flex;justify-content:space-around;
background:white;padding:10px 0;
border-top:1px solid #ddd
}
.center{
width:70px;height:70px;
background:#2f80ed;color:white;
border-radius:50%;
display:flex;align-items:center;justify-content:center;
margin-top:-30px
}

.hidden{display:none}
</style>
</head>

<body>

<div class="header">
<div class="title">Xin chào Thảo</div>
<div class="sub">hệ thống quản lý kho nội bộ</div>
</div>

<!-- HOME -->
<div id="home">
<div class="card">
<div>Doanh thu: <b id="rev">0</b></div>
<div>Đơn hàng: <b id="ord">0</b></div>
<div>Hóa đơn: <b id="inv">0</b></div>
</div>
</div>

<!-- KHO -->
<div id="kho" class="hidden">
<div class="card">
<input id="pname" placeholder="Tên vải">
<input id="color" placeholder="Màu">
<input id="importPrice" type="number" step="0.01" placeholder="Giá nhập">
<input id="sellPrice" type="number" step="0.01" placeholder="Giá bán">
<input id="qty" type="number" step="0.01" placeholder="Số mét">
<button onclick="addProduct()">Nhập hàng</button>
</div>
<div id="plist"></div>
</div>

<!-- BÁN -->
<div id="sell" class="hidden">

<input id="search" placeholder="Tìm sản phẩm..." oninput="render()">

<div class="grid" id="grid"></div>

<div class="cart">
<div id="cart"></div>
<div><b>Tổng: <span id="sum">0</span> VNĐ</b></div>

<select id="customer">
<option value="">Khách lẻ</option>
</select>

<button onclick="checkout(false)">Thanh toán</button>
<button onclick="checkout(true)">Ghi nợ</button>
</div>

</div>

<!-- TAB -->
<div class="bottom">
<div onclick="tab('home')">Trang chủ</div>
<div onclick="tab('kho')">Kho</div>
<div class="center" onclick="tab('sell')">Bán</div>
<div>Khách</div>
<div>Báo cáo</div>
</div>

<script>
let products=JSON.parse(localStorage.getItem("p")||"[]");
let bills=JSON.parse(localStorage.getItem("b")||"[]");
let customers=JSON.parse(localStorage.getItem("c")||"[]");
let cart=[];

function save(){
localStorage.setItem("p",JSON.stringify(products));
localStorage.setItem("b",JSON.stringify(bills));
localStorage.setItem("c",JSON.stringify(customers));
}

function format(n){return n.toLocaleString("vi-VN");}

function tab(id){
["home","kho","sell"].forEach(x=>{
document.getElementById(x).classList.add("hidden")
});
document.getElementById(id).classList.remove("hidden");
render();
}

/* ADD PRODUCT */
function addProduct(){
products.push({
id:Date.now(),
name:pname.value,
color:color.value,
importPrice:+importPrice.value,
sellPrice:+sellPrice.value,
stock:+qty.value
});
save();render();
}

/* ADD CART */
function addCart(id){
let q=parseFloat(document.getElementById("q"+id).value);
if(!q) return;

let p=products.find(x=>x.id==id);

cart.push({
name:p.name+"-"+p.color,
qty:q,
price:p.sellPrice,
total:q*p.sellPrice
});
render();
}

/* CHECKOUT */
function checkout(debt){
let total=cart.reduce((a,b)=>a+b.total,0);

cart.forEach(c=>{
let p=products.find(x=>c.name.includes(x.name));
p.stock-=c.qty;
});

bills.push({
time:new Date(),
total,
debt
});

cart=[];
save();render();

alert("Tổng: "+format(total));
}

/* RENDER */
function render(){

let kw=search?.value||"";

/* GRID */
grid.innerHTML="";
products.filter(p=>p.name.includes(kw)).forEach(p=>{
grid.innerHTML+=`
<div class="item">
<b>${p.name}</b><br>
${p.color}<br>
Giá: ${format(p.sellPrice)}<br>
Tồn: ${p.stock}m
<input id="q${p.id}" type="number" step="0.01" placeholder="Mét">
<button onclick="addCart(${p.id})">Thêm</button>
</div>`;
});

/* CART */
let html="",t=0;
cart.forEach(c=>{
t+=c.total;
html+=`<div>${c.name} (${c.qty}) - ${format(c.total)}</div>`;
});
cart.innerHTML=html;
sum.innerText=format(t);

/* DASH */
let rev=0;
bills.forEach(b=>rev+=b.total);

rev.innerText=format(rev);
ord.innerText=bills.length;
inv.innerText=bills.length;

/* LIST */
plist.innerHTML="";
products.forEach(p=>{
plist.innerHTML+=`
<div class="card">
${p.name} - ${p.color} - ${p.stock}m
</div>`;
});
}

render();
</script>

</body>
</html>
