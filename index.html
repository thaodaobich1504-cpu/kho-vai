<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POS Kho Vải Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8fafc; font-family: -apple-system, sans-serif; }
        .tab-content { display: none; padding-bottom: 100px; }
        .tab-content.active { display: block; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .nav-center-btn { width: 64px; height: 64px; background: #2563eb; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-top: -32px; border: 5px solid #fff; color: white; box-shadow: 0 10px 15px rgba(37, 99, 235, 0.3); transition: all 0.2s; }
        .nav-center-btn:active { transform: scale(0.9); }
        .product-card { transition: all 0.2s; border: 1px solid #f1f5f9; }
        .product-card:active { background-color: #f1f5f9; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body>

    <header class="bg-white p-5 flex justify-between items-center sticky top-0 z-40 border-b border-gray-50">
        <div>
            <h1 class="text-xl font-bold text-gray-900">Xin chào, Thảo 👋</h1>
            <p class="text-[10px] text-blue-600 font-black uppercase tracking-widest">Hệ thống quản lý nội bộ</p>
        </div>
        <div class="flex gap-3">
            <i class="fa-solid fa-magnifying-glass text-gray-400 text-lg"></i>
            <i class="fa-solid fa-circle-user text-blue-600 text-2xl"></i>
        </div>
    </header>

    <main class="p-4">
        <section id="home" class="tab-content active">
            <div class="grid grid-cols-3 gap-3 mb-6">
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 text-center">
                    <p class="text-[9px] text-gray-400 font-bold uppercase mb-1">Doanh thu</p>
                    <p class="font-black text-blue-600" id="stat-revenue">0</p>
                </div>
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 text-center">
                    <p class="text-[9px] text-gray-400 font-bold uppercase mb-1">Mã hàng</p>
                    <p class="font-black text-orange-600" id="stat-count">0</p>
                </div>
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 text-center">
                    <p class="text-[9px] text-gray-400 font-bold uppercase mb-1">Tổng tồn (m)</p>
                    <p class="font-black text-green-600" id="stat-stock">0</p>
                </div>
            </div>

            <div class="bg-blue-600 p-6 rounded-3xl text-white shadow-xl mb-6">
                <p class="text-xs opacity-80 font-bold mb-1 uppercase">Trạng thái ca làm việc</p>
                <div class="flex justify-between items-center">
                    <p class="text-lg font-bold">Đang hoạt động</p>
                    <button class="bg-white text-blue-600 px-4 py-2 rounded-xl text-xs font-black shadow-sm">VÀO CA NGAY!</button>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <button onclick="switchTab('warehouse')" class="p-6 bg-white rounded-3xl border border-gray-100 shadow-sm flex flex-col items-center gap-2">
                    <div class="w-12 h-12 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center text-xl"><i class="fa-solid fa-plus"></i></div>
                    <span class="text-xs font-bold text-gray-600">Nhập mã hàng</span>
                </button>
                <button onclick="switchTab('stock')" class="p-6 bg-white rounded-3xl border border-gray-100 shadow-sm flex flex-col items-center gap-2">
                    <div class="w-12 h-12 bg-green-100 text-green-600 rounded-2xl flex items-center justify-center text-xl"><i class="fa-solid fa-boxes-stacked"></i></div>
                    <span class="text-xs font-bold text-gray-600">Xem kho vải</span>
                </button>
            </div>
        </section>

        <section id="pos" class="tab-content">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-black text-gray-900 italic">Bán hàng nhanh</h2>
                <div class="flex gap-2">
                    <div class="bg-white p-2 rounded-lg border border-gray-100"><i class="fa-solid fa-table-cells-large text-gray-400"></i></div>
                </div>
            </div>
            
            <div class="relative mb-6">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-gray-300"></i>
                <input type="text" placeholder="Tìm kiếm mã hoặc màu..." class="w-full bg-white border border-gray-100 p-4 pl-12 rounded-2xl outline-none focus:border-blue-500 shadow-sm">
            </div>

            <div id="pos-product-list" class="space-y-3">
                </div>

            <div id="checkout-bar" class="hidden fixed bottom-24 left-4 right-4 bg-white p-4 rounded-2xl shadow-2xl border border-blue-50 flex justify-between items-center z-50">
                <div class="flex items-center gap-3">
                    <div class="bg-blue-100 text-blue-600 w-10 h-10 rounded-xl flex items-center justify-center font-bold">
                        <i class="fa-solid fa-cart-shopping"></i>
                    </div>
                    <div>
                        <p class="text-[10px] font-bold text-gray-400 uppercase tracking-tighter">Tổng cộng</p>
                        <p id="total-price" class="font-black text-blue-600 text-lg">0đ</p>
                    </div>
                </div>
                <button onclick="processSale()" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-black text-sm shadow-lg shadow-blue-100">THANH TOÁN</button>
            </div>
        </section>

        <section id="warehouse" class="tab-content">
            <h2 class="text-xl font-black mb-6">Nhập kho mới</h2>
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <div class="col-span-2">
                        <label class="block text-[10px] font-black text-gray-400 mb-1 uppercase">Tên loại vải</label>
                        <input type="text" id="p-name" class="w-full p-3 bg-gray-50 rounded-xl outline-none border border-transparent focus:border-blue-500" placeholder="Ví dụ: Đũi ren">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-gray-400 mb-1 uppercase">Mã hàng</label>
                        <input type="text" id="p-sku" class="w-full p-3 bg-gray-50 rounded-xl outline-none border border-transparent focus:border-blue-500" placeholder="M001">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-gray-400 mb-1 uppercase">Màu sắc</label>
                        <input type="text" id="p-color" class="w-full p-3 bg-gray-50 rounded-xl outline-none border border-transparent focus:border-blue-500" placeholder="Trắng">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-gray-400 mb-1 uppercase">Số mét nhập</label>
                        <input type="number" id="p-qty" class="w-full p-3 bg-gray-50 rounded-xl outline-none border border-transparent focus:border-blue-500" placeholder="0">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-gray-400 mb-1 uppercase">Giá nhập /m</label>
                        <input type="number" id="p-cost" class="w-full p-3 bg-gray-50 rounded-xl outline-none border border-transparent focus:border-blue-500" placeholder="0">
                    </div>
                    <div class="col-span-2">
                        <label class="block text-[10px] font-black text-gray-400 mb-1 uppercase">Giá bán /m</label>
                        <input type="number" id="p-price" class="w-full p-3 bg-gray-50 rounded-xl outline-none border border-transparent focus:border-blue-500 text-blue-600 font-bold" placeholder="0">
                    </div>
                </div>
                <button onclick="saveProduct()" class="w-full py-4 bg-gray-900 text-white rounded-2xl font-black shadow-xl">XÁC NHẬN NHẬP KHO</button>
            </div>
        </section>

        <section id="stock" class="tab-content">
            <h2 class="text-xl font-black mb-6">Tồn kho chi tiết</h2>
            <div id="stock-list" class="space-y-3">
                </div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 flex justify-around items-center p-3 pb-8 z-50">
        <button onclick="switchTab('home')" class="flex flex-col items-center gap-1 text-blue-600 nav-btn" id="nav-home">
            <i class="fa-solid fa-house-chimney text-lg"></i>
            <span class="text-[9px] font-black uppercase">Trang chủ</span>
        </button>
        <button onclick="switchTab('stock')" class="flex flex-col items-center gap-1 text-gray-300 nav-btn" id="nav-stock">
            <i class="fa-solid fa-box-archive text-lg"></i>
            <span class="text-[9px] font-black uppercase">Kho hàng</span>
        </button>
        
        <button onclick="switchTab('pos')" class="nav-center-btn">
            <i class="fa-solid fa-cart-shopping text-2xl"></i>
        </button>

        <button onclick="switchTab('warehouse')" class="flex flex-col items-center gap-1 text-gray-300 nav-btn" id="nav-warehouse">
            <i class="fa-solid fa-square-plus text-lg"></i>
            <span class="text-[9px] font-black uppercase">Thêm mới</span>
        </button>
        <button onclick="alert('Tính năng báo cáo đang phát triển')" class="flex flex-col items-center gap-1 text-gray-300">
            <i class="fa-solid fa-chart-line text-lg"></i>
            <span class="text-[9px] font-black uppercase">Báo cáo</span>
        </button>
    </nav>

    <script>
        // Khởi tạo dữ liệu từ LocalStorage
        let data = JSON.parse(localStorage.getItem('thaokhovai_db')) || { products: [], sales: [] };
        let cart = [];

        function saveDB() {
            localStorage.setItem('thaokhovai_db', JSON.stringify(data));
            updateStats();
        }

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            
            // Cập nhật màu icon nav
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.replace('text-blue-600', 'text-gray-300'));
            const activeNav = document.getElementById('nav-' + id);
            if(activeNav) activeNav.classList.replace('text-gray-300', 'text-blue-600');

            if(id === 'pos') renderPOS();
            if(id === 'stock') renderStock();
        }

        function saveProduct() {
            const name = document.getElementById('p-name').value;
            const sku = document.getElementById('p-sku').value;
            const color = document.getElementById('p-color').value;
            const qty = parseFloat(document.getElementById('p-qty').value);
            const cost = parseFloat(document.getElementById('p-cost').value);
            const price = parseFloat(document.getElementById('p-price').value);

            if(!name || !sku || isNaN(qty)) return alert("Vui lòng điền đủ thông tin!");

            data.products.push({ id: Date.now(), name, sku, color, qty, cost, price });
            saveDB();
            alert("Đã nhập kho thành công!");
            switchTab('stock');
            // Reset form
            document.querySelectorAll('#warehouse input').forEach(i => i.value = '');
        }

        function renderStock() {
            const list = document.getElementById('stock-list');
            list.innerHTML = data.products.length ? data.products.map(p => `
                <div class="bg-white p-4 rounded-2xl border border-gray-100 flex justify-between items-center shadow-sm">
                    <div>
                        <p class="text-[10px] font-black text-blue-500 uppercase">${p.name}</p>
                        <p class="font-bold text-gray-800">${p.sku} - ${p.color}</p>
                        <p class="text-[10px] text-gray-400">Giá nhập: ${p.cost?.toLocaleString()}đ</p>
                    </div>
                    <div class="text-right">
                        <p class="font-black text-blue-600 text-lg">${p.qty}m</p>
                        <p class="text-[10px] font-bold text-orange-500 uppercase">Giá bán: ${p.price?.toLocaleString()}đ</p>
                    </div>
                </div>
            `).join('') : '<p class="text-center text-gray-400 py-10">Kho trống, hãy nhập hàng ngay!</p>';
        }

        function renderPOS() {
            const list = document.getElementById('pos-product-list');
            list.innerHTML = data.products.map(p => `
                <div class="product-card bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm relative">
                    <div class="flex-1">
                        <p class="text-[10px] font-black text-blue-500 uppercase mb-0.5">${p.name}</p>
                        <p class="font-bold text-gray-900">${p.sku} - ${p.color}</p>
                        <p class="text-[11px] font-bold text-gray-400 mt-1 uppercase tracking-tighter">Sẵn có: <span class="text-blue-600">${p.qty}m</span></p>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="text-right">
                            <p class="font-black text-blue-600 text-lg">${p.price?.toLocaleString()}đ</p>
                            <span class="text-[9px] bg-blue-50 text-blue-500 px-2 py-0.5 rounded-md font-black uppercase">Đơn vị: Mét</span>
                        </div>
                        <button onclick="addToCart(${p.id})" class="bg-blue-600 text-white w-10 h-10 rounded-xl flex items-center justify-center shadow-lg active:scale-90 transition-all">
                            <i class="fa-solid fa-plus"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(productId) {
            const product = data.products.find(p => p.id === productId);
            if(product.qty <= 0) return alert("Sản phẩm đã hết hàng!");
            
            let m = prompt(`Bán ${product.name} (${product.sku}). Nhập số mét:`, "1");
            let qtyToSell = parseFloat(m);

            if(isNaN(qtyToSell) || qtyToSell <= 0) return;
            if(qtyToSell > product.qty) return alert("Không đủ vải trong kho!");

            // Xử lý trừ kho trực tiếp
            product.qty -= qtyToSell;
            const saleTotal = qtyToSell * product.price;
            
            data.sales.push({
                time: new Date().toLocaleString(),
                product: product.sku,
                qty: qtyToSell,
                total: saleTotal
            });

            saveDB();
            alert(`Đã bán thành công ${qtyToSell}m. Tổng: ${saleTotal.toLocaleString()}đ`);
            renderPOS();
        }

        function updateStats() {
            let totalM = 0;
            let totalRev = 0;
            data.products.forEach(p => totalM += p.qty);
            data.sales.forEach(s => totalRev += s.total);

            document.getElementById('stat-stock').innerText = totalM.toLocaleString();
            document.getElementById('stat-count').innerText = data.products.length;
            document.getElementById('stat-revenue').innerText = totalRev.toLocaleString() + 'đ';
        }

        // Khởi động
        updateStats();
    </script>
</body>
</html>
