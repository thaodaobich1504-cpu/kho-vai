<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kho Vải Pro</title>

<style>
body{
    font-family: Arial;
    margin:0;
    background:#f4f6ff;
}

header{
    background:#6C63FF;
    color:white;
    padding:15px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
}

.container{
    padding:10px;
}

.card{
    background:white;
    padding:10px;
    margin-bottom:10px;
    border-radius:10px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

input,button,select{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:10px;
    border-radius:8px;
    border:1px solid #ddd;
}

button{
    background:#6C63FF;
    color:white;
    border:none;
}

.item{
    padding:10px;
    border-bottom:1px solid #eee;
}

.small{
    font-size:12px;
    color:gray;
}

.row{
    display:flex;
    gap:5px;
}
.row button{
    flex:1;
}
</style>
</head>

<body>

<header>🧵 Kho Vải Pro</header>

<div class="container">

<div class="card">
<h3>Thêm vải</h3>
<input id="name" placeholder="Tên vải">
<input id="price" type="number" placeholder="Giá / mét">
<input id="stock" type="number" placeholder="Số mét ban đầu">
<button onclick="addProduct()">Thêm</button>
</div>

<div class="card">
<h3>Tìm kiếm</h3>
<input id="search" placeholder="Nhập tên vải..." oninput="render()">
</div>

<div class="card">
<h3>Nhập kho</h3>
<select id="importSelect"></select>
<input id="importQty" type="number" step="0.01">
<button onclick="importStock()">Nhập</button>
</div>

<div class="card">
<h3>Bán hàng</h3>
<select id="sellSelect"></select>
<input id="sellQty" type="number" step="0.01">
<button onclick="sellStock()">Bán</button>
</div>

<div class="card">
<h3>Danh sách kho</h3>
<div id="list"></div>
<h4 id="total"></h4>
</div>

<div class="card">
<h3>Lịch sử</h3>
<div id="history"></div>
</div>

<div class="card">
<button onclick="exportData()">📥 Backup dữ liệu</button>
</div>

</div>

<script>
let products = JSON.parse(localStorage.getItem("khovai") || "[]");
let history = JSON.parse(localStorage.getItem("history") || "[]");

function save(){
    localStorage.setItem("khovai", JSON.stringify(products));
    localStorage.setItem("history", JSON.stringify(history));
}

function render(){
    let list = document.getElementById("list");
    let sell = document.getElementById("sellSelect");
    let imp = document.getElementById("importSelect");
    let search = document.getElementById("search").value.toLowerCase();

    list.innerHTML = "";
    sell.innerHTML = "";
    imp.innerHTML = "";

    let totalValue = 0;

    products.forEach((p, i) => {

        if(!p.name.toLowerCase().includes(search)) return;

        totalValue += p.stock * p.price;

        list.innerHTML += `
        <div class="item">
            <b>${p.name}</b><br>
            <span class="small">Tồn: ${p.stock.toFixed(2)} m | Giá: ${p.price}</span>
            <div class="row">
                <button onclick="edit(${i})">Sửa</button>
                <button onclick="removeItem(${i})">Xoá</button>
            </div>
        </div>`;

        sell.innerHTML += `<option value="${i}">${p.name}</option>`;
        imp.innerHTML += `<option value="${i}">${p.name}</option>`;
    });

    document.getElementById("total").innerText = 
        "💰 Tổng giá trị kho: " + totalValue.toFixed(0);

    renderHistory();
}

function renderHistory(){
    let box = document.getElementById("history");
    box.innerHTML = "";

    history.slice().reverse().forEach(h=>{
        box.innerHTML += `<div class="small">
        ${h.time} - ${h.text}
        </div>`;
    });
}

function addProduct(){
    let name = document.getElementById("name").value;
    let price = parseFloat(document.getElementById("price").value);
    let stock = parseFloat(document.getElementById("stock").value);

    if(!name || isNaN(price) || isNaN(stock)) return;

    products.push({name, price, stock});
    history.push({time:new Date().toLocaleString(), text:"Thêm "+name});

    save();
    render();
}

function importStock(){
    let i = document.getElementById("importSelect").value;
    let qty = parseFloat(document.getElementById("importQty").value);

    if(isNaN(qty)) return;

    products[i].stock += qty;

    history.push({
        time:new Date().toLocaleString(),
        text:"Nhập "+products[i].name+" +"+qty+"m"
    });

    save();
    render();
}

function sellStock(){
    let i = document.getElementById("sellSelect").value;
    let qty = parseFloat(document.getElementById("sellQty").value);

    if(isNaN(qty)) return;

    if(products[i].stock < qty){
        alert("Không đủ hàng!");
        return;
    }

    products[i].stock -= qty;

    let total = qty * products[i].price;

    history.push({
        time:new Date().toLocaleString(),
        text:"Bán "+products[i].name+" -"+qty+"m = "+total
    });

    alert("Tổng tiền: " + total.toFixed(0));

    save();
    render();
}

function removeItem(i){
    if(confirm("Xoá sản phẩm?")){
        products.splice(i,1);
        save();
        render();
    }
}

function edit(i){
    let p = products[i];
    let name = prompt("Tên", p.name);
    let price = prompt("Giá", p.price);

    if(name && price){
        p.name = name;
        p.price = parseFloat(price);
        save();
        render();
    }
}

function exportData(){
    let data = JSON.stringify({products, history});
    let blob = new Blob([data], {type:"application/json"});
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "kho-vai.json";
    a.click();
}

render();
</script>

</body>
</html>
