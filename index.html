<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kho Vải PRO</title>

<style>
body{margin:0;font-family:-apple-system;background:#f4f6fa}

/* HEADER */
.header{background:white;padding:15px;font-weight:bold}
.sub{font-size:13px;color:#666}

/* DASH */
.dashboard{display:flex;gap:10px;padding:10px}
.box{flex:1;background:white;padding:10px;border-radius:10px;text-align:center}
.big{font-size:18px;font-weight:bold}

/* CARD */
.card{background:white;margin:10px;padding:12px;border-radius:10px}

/* INPUT */
input,select{
width:100%;padding:10px;margin-top:6px;
border-radius:8px;border:1px solid #ddd
}

/* BUTTON */
button{
width:100%;padding:10px;margin-top:8px;
border:none;background:#2f80ed;color:white;border-radius:8px
}

/* GRID */
.grid{
display:grid;grid-template-columns:1fr 1fr;
gap:10px;padding:10px;margin-bottom:260px;
}
.item{background:white;padding:10px;border-radius:10px}

/* CART */
.cart{
position:fixed;bottom:70px;left:0;right:0;
background:white;padding:10px;border-top:1px solid #ddd;
max-height:260px;overflow:auto
}
.pay{background:#27ae60;color:white;padding:12px;border-radius:10px;margin-top:10px;text-align:center}
.debt{background:#e67e22;color:white;padding:12px;border-radius:10px;margin-top:10px;text-align:center}

/* TAB */
.bottom{
position:fixed;bottom:0;width:100%;
display:flex;justify-content:space-around;
background:white;padding:10px 0;border-top:1px solid #ddd
}
.center{
width:70px;height:70px;background:#2f80ed;
color:white;border-radius:50%;
display:flex;align-items:center;justify-content:center;
margin-top:-30px
}

.hidden{display:none}
</style>
</head>

<body>

<div class="header">
Xin chào Thảo<br>
<div class="sub">Kho nội bộ</div>
</div>

<!-- HOME -->
<div id="home">
<div class="dashboard">
<div class="box">Doanh thu<div class="big" id="rev">0</div></div>
<div class="box">Đơn<div class="big" id="ord">0</div></div>
<div class="box">Công nợ<div class="big" id="debt">0</div></div>
</div>
</div>

<!-- KHO -->
<div id="kho" class="hidden">
<div class="card">
<input id="code" placeholder="Mã hàng">
<input id="name" placeholder="Tên vải">
<input id="color" placeholder="Màu">
<input id="importPrice" type="number" step="0.01" placeholder="Giá nhập">
<input id="price" type="number" step="0.01" placeholder="Giá bán">
<input id="qty" type="number" step="0.01" placeholder="Số mét">
<button onclick="addProduct()">Thêm sản phẩm</button>
</div>
<div id="list"></div>
</div>

<!-- SELL -->
<div id="sell" class="hidden">

<input id="search" placeholder="Tìm sản phẩm..." oninput="render()">

<div class="grid" id="grid"></div>

<div class="cart">
<div id="cart"></div>
<b>Tổng: <span id="sum">0</span></b>

<select id="customer"></select>

<div class="pay" onclick="checkout(false)">Thanh toán</div>
<div class="debt" onclick="checkout(true)">Ghi nợ</div>
</div>

</div>

<!-- CUSTOMER -->
<div id="cus" class="hidden">
<div class="card">
<input id="cname" placeholder="Tên khách">
<input id="phone" placeholder="SĐT">
<button onclick="addCustomer()">Thêm khách</button>
</div>
<div id="clist"></div>
</div>

<!-- TAB -->
<div class="bottom">
<div onclick="tab('home')">Trang</div>
<div onclick="tab('kho')">Kho</div>
<div class="center" onclick="tab('sell')">Bán</div>
<div onclick="tab('cus')">Khách</div>
<div>...</div>
</div>

<script>
let products=JSON.parse(localStorage.getItem("p")||"[]");
let customers=JSON.parse(localStorage.getItem("c")||"[]");
let bills=JSON.parse(localStorage.getItem("b")||"[]");
let cart=[];

function save(){
localStorage.setItem("p",JSON.stringify(products));
localStorage.setItem("c",JSON.stringify(customers));
localStorage.setItem("b",JSON.stringify(bills));
}

function tab(id){
["home","kho","sell","cus"].forEach(x=>{
document.getElementById(x).classList.add("hidden")
});
document.getElementById(id).classList.remove("hidden");
render();
}

function format(n){return n.toLocaleString("vi-VN")}

/* ADD PRODUCT */
function addProduct(){
products.push({
id:Date.now(),
code:code.value,
name:name.value,
color:color.value,
import:+importPrice.value,
price:+price.value,
stock:+qty.value
});
save();render();
}

/* ADD CUSTOMER */
function addCustomer(){
customers.push({
id:Date.now(),
name:cname.value,
phone:phone.value,
debt:0
});
save();render();
}

/* ADD CART */
function addCart(id){
let q=parseFloat(prompt("Nhập mét"));
if(!q) return;

let p=products.find(x=>x.id==id);

cart.push({
id:p.id,
name:p.name,
color:p.color,
qty:q,
price:p.price,
total:q*p.price
});
render();
}

/* CHECKOUT */
function checkout(isDebt){
let total=cart.reduce((a,b)=>a+b.total,0);
let cusId=customer.value;

cart.forEach(c=>{
let p=products.find(x=>x.id==c.id);
p.stock-=c.qty;
});

if(isDebt && cusId){
let c=customers.find(x=>x.id==cusId);
c.debt+=total;
}

bills.push({time:new Date(),total});

cart=[];
save();render();

alert("Tổng: "+format(total));
}

/* RENDER */
function render(){

/* GRID */
let kw=search?.value||"";
grid.innerHTML="";
products.filter(p=>p.name.includes(kw)).forEach(p=>{
grid.innerHTML+=`
<div class="item" onclick="addCart(${p.id})">
<b>${p.name}</b><br>
${p.color}<br>
${format(p.price)}
</div>`;
});

/* CART */
let html="",t=0;
cart.forEach(c=>{
t+=c.total;
html+=`<div>${c.name} (${c.qty}m) - ${format(c.total)}</div>`;
});
cart.innerHTML=html;
sum.innerText=format(t);

/* CUSTOMER */
customer.innerHTML='<option value="">Khách lẻ</option>';
customers.forEach(c=>{
customer.innerHTML+=`<option value="${c.id}">${c.name}</option>`;
});

/* CUSTOMER LIST */
clist.innerHTML="";
customers.forEach(c=>{
clist.innerHTML+=`<div class="card">${c.name} - ${c.phone} - Nợ: ${format(c.debt)}</div>`;
});

/* DASH */
let rev=0,debtVal=0;
bills.forEach(b=>rev+=b.total);
customers.forEach(c=>debtVal+=c.debt);

rev.innerText=format(rev);
ord.innerText=bills.length;
debt.innerText=format(debtVal);

/* LIST */
list.innerHTML="";
products.forEach(p=>{
list.innerHTML+=`<div class="card">${p.code} - ${p.name} (${p.color}) - ${p.stock}m</div>`;
});
}

render();
</script>

</body>
</html>
