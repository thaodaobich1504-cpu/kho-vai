<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mini Kiot - Quản lý kho 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .active-tab { color: #2563eb; font-weight: bold; }
        .hidden { display: none; }
        .btn-active:active { transform: scale(0.96); transition: 0.1s; }
    </style>
</head>
<body class="bg-[#F4F7FA] pb-24">

    <div id="app" class="max-w-md mx-auto min-h-screen relative shadow-2xl bg-[#F4F7FA]">
        
        <div id="screen-home">
            <header class="bg-white p-4 flex justify-between items-center sticky top-0 z-10 shadow-sm">
                <h1 class="text-lg font-bold text-gray-800">Chào, Đào Bích Thảo 👋</h1>
                <div class="flex gap-4 text-gray-500 text-xl"><span>🔍</span><span>🔔</span></div>
            </header>

            <section class="p-4 space-y-3">
                <div class="bg-blue-50 border border-blue-100 p-3 rounded-xl text-[11px] text-blue-700 flex justify-between items-center">
                    <span>Trạng thái: <b>Cơ quan thuế đã chấp nhận</b></span>
                    <span class="cursor-pointer">✕</span>
                </div>
                <div class="bg-white p-4 rounded-xl flex justify-between items-center shadow-sm border border-gray-100">
                    <span class="text-sm font-semibold text-gray-700">Chưa vào ca làm việc!</span>
                    <button class="bg-blue-100 text-blue-600 px-4 py-2 rounded-full text-xs font-bold btn-active">Vào ca</button>
                </div>
            </section>

            <section class="px-4 grid grid-cols-2 gap-3 mb-4">
                <div class="bg-white p-4 rounded-2xl shadow-sm border-l-4 border-blue-500">
                    <p class="text-[10px] text-gray-400 uppercase font-bold">Doanh thu</p>
                    <p id="total-revenue" class="text-xl font-bold">0</p>
                </div>
                <div class="bg-white p-4 rounded-2xl shadow-sm border-l-4 border-orange-400">
                    <p class="text-[10px] text-gray-400 uppercase font-bold">Đơn hàng</p>
                    <p id="total-orders" class="text-xl font-bold">0</p>
                </div>
            </section>

            <div class="px-4 grid grid-cols-4 gap-3">
                <div onclick="switchScreen('screen-products')" class="flex flex-col items-center bg-white p-3 rounded-2xl shadow-sm btn-active cursor-pointer">
                    <div class="text-2xl mb-1">📦</div>
                    <span class="text-[10px] text-gray-600 font-medium text-center">Sản phẩm</span>
                </div>
                <div class="flex flex-col items-center bg-white p-3 rounded-2xl shadow-sm btn-active opacity-50">
                    <div class="text-2xl mb-1">👤</div>
                    <span class="text-[10px] text-gray-600 font-medium text-center">Danh bạ</span>
                </div>
                <div class="flex flex-col items-center bg-white p-3 rounded-2xl shadow-sm btn-active opacity-50">
                    <div class="text-2xl mb-1">🪑</div>
                    <span class="text-[10px] text-gray-600 font-medium text-center">Bàn</span>
                </div>
                <div onclick="switchScreen('screen-stock')" class="flex flex-col items-center bg-white p-3 rounded-2xl shadow-sm btn-active cursor-pointer">
                    <div class="text-2xl mb-1 text-orange-600">🏠</div>
                    <span class="text-[10px] text-gray-600 font-medium text-center">Kho</span>
                </div>
                </div>
        </div>

        <div id="screen-stock" class="hidden">
            <header class="bg-white p-4 flex items-center sticky top-0 z-10 shadow-sm">
                <button onclick="switchScreen('screen-home')" class="mr-4 text-xl">←</button>
                <h1 class="text-lg font-bold">Quản lý kho hàng</h1>
            </header>
            <div class="p-4">
                <button onclick="addProduct()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold mb-4 shadow-lg btn-active">+ Thêm hàng mới</button>
                <div id="inventory-list" class="space-y-3">
                    </div>
            </div>
        </div>

        <div id="screen-pos" class="hidden p-4">
            <h1 class="text-xl font-bold mb-4">Bán hàng nhanh</h1>
            <div id="pos-list" class="space-y-4"></div>
        </div>

        <nav class="fixed bottom-0 w-full max-w-md bg-white border-t border-gray-100 flex justify-around items-end pb-6 pt-2 z-30">
            <div onclick="switchScreen('screen-home')" class="nav-item flex flex-col items-center active-tab cursor-pointer">
                <span class="text-xl">🏠</span><span class="text-[9px]">Trang chủ</span>
            </div>
            <div class="nav-item flex flex-col items-center text-gray-400 opacity-50">
                <span class="text-xl">📋</span><span class="text-[9px]">Đơn hàng</span>
            </div>
            <div onclick="switchScreen('screen-pos')" class="relative -top-5 flex flex-col items-center cursor-pointer">
                <div class="bg-blue-600 w-14 h-14 rounded-full flex items-center justify-center shadow-xl border-[4px] border-white btn-active">
                    <span class="text-white text-2xl">🛒</span>
                </div>
                <span class="text-[10px] text-blue-600 font-bold mt-1">Bán hàng</span>
            </div>
            <div class="nav-item flex flex-col items-center text-gray-400 opacity-50">
                <span class="text-xl">🧾</span><span class="text-[9px]">Hóa đơn</span>
            </div>
            <div class="nav-item flex flex-col items-center text-gray-400 opacity-50">
                <span class="text-xl">⚙️</span><span class="text-[9px]">Cài đặt</span>
            </div>
        </nav>
    </div>

    <script>
        // --- DỮ LIỆU ---
        let db = JSON.parse(localStorage.getItem('mini_kiot_db')) || {
            products: [
                { id: 1, name: 'Sữa đặc Larosee', sku: 'SP01', stock: 10, price: 15000 },
                { id: 2, name: 'Bột mì đa dụng', sku: 'SP02', stock: 5, price: 22000 }
            ],
            orders: 0,
            revenue: 0
        };

        function saveDB() {
            localStorage.setItem('mini_kiot_db', JSON.stringify(db));
            renderInventory();
            renderPOS();
            updateDashboard();
        }

        // --- ĐIỀU HƯỚNG ---
        function switchScreen(screenId) {
            ['screen-home', 'screen-stock', 'screen-pos'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });
            document.getElementById(screenId).classList.remove('hidden');
        }

        // --- LOGIC SẢN PHẨM ---
        function addProduct() {
            const name = prompt("Tên sản phẩm:");
            const price = parseInt(prompt("Giá bán:"));
            const stock = parseInt(prompt("Số lượng nhập kho:"));
            if (name && price && stock) {
                db.products.push({ id: Date.now(), name, sku: 'SP' + Math.floor(Math.random()*100), stock, price });
                saveDB();
            }
        }

        function renderInventory() {
            const list = document.getElementById('inventory-list');
            list.innerHTML = db.products.map(p => `
                <div class="bg-white p-4 rounded-xl shadow-sm flex justify-between border border-gray-50">
                    <div>
                        <p class="font-bold text-gray-800">${p.name}</p>
                        <p class="text-xs text-gray-400">Tồn: ${p.stock} | Giá: ${p.price.toLocaleString()}đ</p>
                    </div>
                    <button onclick="deleteProduct(${p.id})" class="text-red-400 text-xs">Xóa</button>
                </div>
            `).join('');
        }

        function deleteProduct(id) {
            if(confirm("Xóa sản phẩm này?")) {
                db.products = db.products.filter(p => p.id !== id);
                saveDB();
            }
        }

        // --- LOGIC BÁN HÀNG (FIX BUG RACE CONDITION) ---
        function renderPOS() {
            const list = document.getElementById('pos-list');
            list.innerHTML = db.products.map(p => `
                <div class="bg-white p-4 rounded-2xl shadow-sm flex justify-between items-center">
                    <span class="font-medium">${p.name} (Tồn: ${p.stock})</span>
                    <button onclick="sellItem(${p.id})" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold btn-active">
                        Bán -${p.price.toLocaleString()}
                    </button>
                </div>
            `).join('');
        }

        function sellItem(id) {
            const p = db.products.find(item => item.id === id);
            if (p.stock > 0) {
                p.stock--;
                db.orders++;
                db.revenue += p.price;
                saveDB();
                alert("Đã bán thành công!");
            } else {
                alert("Hết hàng!");
            }
        }

        function updateDashboard() {
            document.getElementById('total-revenue').innerText = db.revenue.toLocaleString();
            document.getElementById('total-orders').innerText = db.orders;
        }

        // Khởi tạo
        saveDB();
    </script>
</body>
</html>
