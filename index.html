<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kho Vải PRO MAX</title>

<style>
body{margin:0;font-family:-apple-system;background:#f4f6fa}
.header{background:white;padding:15px;font-weight:bold}
.sub{font-size:13px;color:#666}

.card{background:white;margin:10px;padding:12px;border-radius:10px}

input,select{
width:100%;padding:10px;margin-top:6px;
border-radius:8px;border:1px solid #ddd
}

button{
width:100%;padding:10px;margin-top:8px;
border:none;background:#2f80ed;color:white;border-radius:8px
}

.bottom{
position:fixed;bottom:0;width:100%;
display:flex;justify-content:space-around;
background:white;padding:10px 0;border-top:1px solid #ddd
}

.center{
width:70px;height:70px;background:#2f80ed;
color:white;border-radius:50%;
display:flex;align-items:center;justify-content:center;
margin-top:-30px
}

.cart{
position:fixed;bottom:70px;left:0;right:0;
background:white;padding:10px;border-top:1px solid #ddd;
}

.hidden{display:none}
</style>
</head>

<body>

<div class="header">
Xin chào Thảo
<div class="sub">Kho nội bộ</div>
</div>

<!-- KHO -->
<div id="kho">
<div class="card">
<b>Thêm sản phẩm</b>
<input id="pname" placeholder="Tên vải">
<button onclick="addProduct()">Thêm tên vải</button>
</div>

<div class="card">
<b>Thêm mã + màu</b>
<select id="pselect"></select>
<input id="code" placeholder="Mã">
<input id="color" placeholder="Màu">
<input id="price" type="number" step="0.01" placeholder="Giá bán">
<input id="stock" type="number" step="0.01" placeholder="Số mét">
<button onclick="addVariant()">Thêm mã</button>
</div>

<div id="plist"></div>
</div>

<!-- BÁN -->
<div id="sell" class="hidden">

<div class="card">
<select id="sellProduct" onchange="loadVariants()"></select>
<select id="sellVariant"></select>

<input id="met" type="number" step="0.01" placeholder="Số mét">
<input id="priceShow" disabled placeholder="Giá">
<input id="totalShow" disabled placeholder="Thành tiền">

<button onclick="addCart()">Thêm vào giỏ</button>
</div>

<div class="cart">
<div id="cart"></div>
<b>Tổng: <span id="sum">0</span></b>

<select id="customer"></select>

<button onclick="checkout(false)">Thanh toán</button>
<button onclick="checkout(true)">Ghi nợ</button>
</div>

</div>

<!-- KHÁCH -->
<div id="cus" class="hidden">
<div class="card">
<input id="cname" placeholder="Tên khách">
<input id="phone" placeholder="SĐT">
<button onclick="addCustomer()">Thêm</button>
</div>
<div id="clist"></div>
</div>

<!-- BÁO CÁO -->
<div id="report" class="hidden">
<div class="card">
Hôm nay: <b id="today"></b><br>
Tháng: <b id="month"></b><br>
Năm: <b id="year"></b>
</div>
</div>

<!-- TAB -->
<div class="bottom">
<div onclick="tab('kho')">Kho</div>
<div onclick="tab('sell')">Bán</div>
<div onclick="tab('cus')">Khách</div>
<div onclick="tab('report')">Báo cáo</div>
</div>

<script>
let products=JSON.parse(localStorage.getItem("p")||"[]");
let customers=JSON.parse(localStorage.getItem("c")||"[]");
let bills=JSON.parse(localStorage.getItem("b")||"[]");
let cart=[];

function save(){
localStorage.setItem("p",JSON.stringify(products));
localStorage.setItem("c",JSON.stringify(customers));
localStorage.setItem("b",JSON.stringify(bills));
}

function tab(id){
["kho","sell","cus","report"].forEach(x=>{
document.getElementById(x).classList.add("hidden")
});
document.getElementById(id).classList.remove("hidden");
render();
}

function format(n){return n.toLocaleString("vi-VN")}

/* KHO */
function addProduct(){
products.push({name:pname.value,variants:[]});
save();render();
}

function addVariant(){
let p=products[pselect.value];
p.variants.push({
code:code.value,
color:color.value,
price:+price.value,
stock:+stock.value
});
save();render();
}

/* LOAD */
function loadVariants(){
let p=products[sellProduct.value];
sellVariant.innerHTML="";
p.variants.forEach((v,i)=>{
sellVariant.innerHTML+=`<option value="${i}">${v.code}-${v.color}</option>`;
});
}

/* AUTO */
sellVariant.onchange=updatePrice;
met.oninput=updatePrice;

function updatePrice(){
let p=products[sellProduct.value];
let v=p.variants[sellVariant.value];
priceShow.value=format(v.price);
totalShow.value=format(v.price*(met.value||0));
}

/* CART */
function addCart(){
let p=products[sellProduct.value];
let v=p.variants[sellVariant.value];
let m=parseFloat(met.value);

cart.push({p:p.name,v:v.code,qty:m,total:v.price*m});
render();
}

/* CHECKOUT */
function checkout(debt){
let total=cart.reduce((a,b)=>a+b.total,0);
let cid=customer.value;

cart.forEach(c=>{
let p=products.find(x=>x.name==c.p);
let v=p.variants.find(x=>x.code==c.v);
v.stock-=c.qty;
});

if(debt && cid){
customers[cid].debt+=total;
}

bills.push({time:new Date(),total});

cart=[];
save();render();
}

/* CUSTOMER */
function addCustomer(){
customers.push({name:cname.value,phone:phone.value,debt:0});
save();render();
}

/* RENDER */
function render(){

/* SELECT */
pselect.innerHTML="";
sellProduct.innerHTML="";
products.forEach((p,i)=>{
pselect.innerHTML+=`<option value="${i}">${p.name}</option>`;
sellProduct.innerHTML+=`<option value="${i}">${p.name}</option>`;
});

/* VARIANT */
if(products.length) loadVariants();

/* CUSTOMER */
customer.innerHTML='<option value="">Khách lẻ</option>';
customers.forEach((c,i)=>{
customer.innerHTML+=`<option value="${i}">${c.name}</option>`;
});

/* LIST */
plist.innerHTML="";
products.forEach(p=>{
plist.innerHTML+=`<div class="card"><b>${p.name}</b><br>`;
p.variants.forEach(v=>{
plist.innerHTML+=`${v.code}-${v.color} (${v.stock}m)<br>`;
});
plist.innerHTML+="</div>";
});

/* CART */
let t=0,html="";
cart.forEach(c=>{
t+=c.total;
html+=`<div>${c.p}-${c.v} (${c.qty}) = ${format(c.total)}</div>`;
});
cart.innerHTML=html;
sum.innerText=format(t);

/* CUSTOMER LIST */
clist.innerHTML="";
customers.forEach(c=>{
clist.innerHTML+=`<div class="card">${c.name} - ${c.phone} - Nợ: ${format(c.debt)}</div>`;
});

/* REPORT */
let today=0,month=0,year=0;
let now=new Date();

bills.forEach(b=>{
let d=new Date(b.time);
if(d.toDateString()==now.toDateString()) today+=b.total;
if(d.getMonth()==now.getMonth()) month+=b.total;
if(d.getFullYear()==now.getFullYear()) year+=b.total;
});

document.getElementById("today").innerText=format(today);
document.getElementById("month").innerText=format(month);
document.getElementById("year").innerText=format(year);
}

render();
</script>

</body>
</html>
